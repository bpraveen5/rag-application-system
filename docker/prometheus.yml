global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    cluster: rag-local
    environment: dev

rule_files: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: rag-application
    metrics_path: /api/actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ["app:8080"]
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: rag-app

  - job_name: postgres-exporter
    static_configs:
      - targets: ["postgres:9187"]

  - job_name: redis-exporter
    static_configs:
      - targets: ["redis:9121"]
